# Package verify gate (SYSTEM.md §11.3): every shipped artifact is checked on
# push/PR — contrast pairs, CSS that actually parses, and a require()-able TW3
# preset. No `build`/`prepare` script exists by design (git-dep recipe:
# committed files ARE the dist); this workflow is the package's only gate.
#
# This delegates to `npm run verify` rather than restating the steps: when the
# steps were duplicated here, a check added to the npm script did not actually
# gate CI. The npm script is the single source of truth.
name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify (contrast gate · CSS parses · TW3 preset loads)
        run: npm run verify
